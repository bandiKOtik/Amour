- type: entity
  parent: [ BaseSimpleMob, MobCombat ]
  id: MobMorph
  name: morph
  description: It looks terrifying.
  components:
  - type: GhostRole
    name: ghost-role-information-morph-name
    description: ghost-role-information-morph-description
    rules: ghost-role-information-morph-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: short
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 54000 # 15h
  - type: GhostTakeoverAvailable
  - type: InputMover
  - type: MobMover
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    sprite: _Orion/Mobs/Aliens/morph.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: alive
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.5
    baseSprintSpeed: 3
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: FoodMeatSlime
      amount: 2
  - type: MeleeWeapon
    altDisarm: false
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Blunt: 11
        Slash: 9
  - type: ReplacementAccent
    accent: genericAggressive
  - type: Speech
    speechVerb: LargeMob
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    understands:
    - TauCetiBasic
  - type: CollectiveMind
    defaultChannel: Morph
    channels:
    - Morph
  - type: VentCrawler
  - type: Hunger
    startingHunger: 0
    baseDecayRate: 0
    starvingSlowdownModifier: 1
  - type: Morph
    damageOnTouch:
      types:
        Blunt: 16
        Slash: 14
  - type: Devourer
    soundStructureDevour: /Audio/Effects/bite.ogg
    devourTime: 3
    structureDevourTime: 3
    whitelist:
      components:
        - Item
        - MobState
    stomachStorageWhitelist:
      components:
        - Item
        - MobState
    foodPreferenceWhitelist:
      components:
        - MobState
        - HumanoidAppearance
  - type: MindContainer
  - type: ChameleonProjector
    whitelist:
      components:
      - Anchorable
      - Item
      - MobState
      - Supermatter
      tags:
      - Bot
      - VimPilot
    blacklist:
      components:
      - ChameleonDisguise # no becoming kleiner
      - Pda # PDAs currently make you invisible /!\
      - Morph
    disguiseProto: ChameleonDisguiseMorph
  - type: UserInterface
    interfaces:
      enum.MimicryKey.Key:
        type: MimicryMenuBoundUserInterface
  - type: Prying
    pryPowered: true
    force: true
    useSound:
      path: /Audio/Machines/airlock_creaking.ogg
  - type: Body
    prototype: Animal
  - type: Puller
    needsHands: false
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  - type: MovementAlwaysTouching
  - type: ZombieImmune
  - type: SlowOnDamage
    speedModifierThresholds:
      150: 1
  - type: AntiRottingContainer
  - type: NameIdentifier
    group: GenericNumber
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Radiation
        damage: 4000
      behaviors:
      - !type:GibBehavior { }
  - type: GlobalAntagonist
    antagonistPrototype: globalAntagonistMorph
  - type: GuideHelp
    guides:
    - Morph

- type: entity
  parent: ChameleonDisguise
  id: ChameleonDisguiseMorph
  categories: [ HideSpawnMenu ]
  components:
  - type: ChameleonDisguise
    doSparks: false
    removeActions: false
  - type: MorphDisguise
